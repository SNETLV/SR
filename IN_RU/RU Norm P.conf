*.tilda.ws = server:tls://77.88.8.8
*.tildaapi.com = server:tls://77.88.8.8
*.tildacdn.com = server:tls://77.88.8.8
*.tildacdn.net = server:tls://77.88.8.8
*.tildaapi.net = server:tls://77.88.8.8
*.carrotquest.app = server:tls://77.88.8.8
